<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cờ Cá Ngựa - Ghi Điểm</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  padding:10px;
  color:#333;
}

h1 { text-align:center; color:white; }

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.player {
  background:#f8f9fc;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.name {
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

input {
  padding:5px;
  font-size:14px;
}

button {
  padding:6px 12px;
  margin:3px;
  border:none;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}

.btn-green { background:#1cc88a; color:white; }
.btn-blue { background:#4e73df; color:white; }
.btn-red { background:#e74a3b; color:white; }
.btn-gray { background:#858796; color:white; }

.summary { font-weight:bold; font-size:16px; }

.history-item {
  background:#eee;
  padding:8px;
  border-radius:8px;
  margin-bottom:5px;
  font-size:13px;
}
</style>
</head>

<body>

<h1>Ghi Điểm Cờ Cá Ngựa</h1>

<div class="container">
  <button class="btn-blue" onclick="addPlayer()">+ Thêm người</button>
  <button class="btn-red" onclick="saveHistory()">Kết thúc ván</button>
  <button class="btn-gray" onclick="reset()">Reset</button>
</div>

<div id="players" class="container"></div>

<div class="container summary">
  Tổng Đá: <span id="totalDa">0</span> |
  Tổng Bị Đá: <span id="totalBiDa">0</span>
</div>

<div class="container">
  <h3>Lịch sử</h3>
  <div id="history"></div>
</div>

<script>
let players = JSON.parse(localStorage.getItem("players")) || [
  {name:"Người 1", da:0, bida:0},
  {name:"Người 2", da:0, bida:0}
];

let history = JSON.parse(localStorage.getItem("history")) || [];

function saveStorage(){
  localStorage.setItem("players",JSON.stringify(players));
  localStorage.setItem("history",JSON.stringify(history));
}

function render(){
  const el=document.getElementById("players");
  el.innerHTML="";
  let totalDa=0,totalBiDa=0;

  players.forEach((p,i)=>{
    totalDa+=p.da;
    totalBiDa+=p.bida;

    el.innerHTML+=`
    <div class="player">
      <div class="name" onclick="editName(${i})">${p.name}</div>
      <br>
      Đá: ${p.da}
      <button class="btn-green" onclick="incDa(${i})">+</button>
      <button class="btn-red" onclick="decDa(${i})">-</button>
      <br>
      Bị đá: ${p.bida}
      <button class="btn-green" onclick="incBiDa(${i})">+</button>
      <button class="btn-red" onclick="decBiDa(${i})">-</button>
      <br>
      <b>Tổng: ${p.da+p.bida}</b>
    </div>`;
  });

  document.getElementById("totalDa").innerText=totalDa;
  document.getElementById("totalBiDa").innerText=totalBiDa;

  renderHistory();
  saveStorage();
}

function editName(i){
  const el=document.getElementsByClassName("name")[i];
  const old=players[i].name;
  el.innerHTML=`<input id="inputName${i}" value="${old}" 
    onblur="saveName(${i})"
    onkeydown="if(event.key==='Enter'){saveName(${i})}" />`;
  document.getElementById("inputName"+i).focus();
}

function saveName(i){
  const value=document.getElementById("inputName"+i).value;
  players[i].name=value || "Người "+(i+1);
  render();
}

function incDa(i){ players[i].da++; render(); }
function decDa(i){ if(players[i].da>0) players[i].da--; render(); }

function incBiDa(i){ players[i].bida++; render(); }
function decBiDa(i){ if(players[i].bida>0) players[i].bida--; render(); }

function addPlayer(){
  if(players.length<4){
    players.push({name:"Người "+(players.length+1),da:0,bida:0});
    render();
  } else alert("Tối đa 4 người!");
}

function reset(){
  players.forEach(p=>{p.da=0;p.bida=0});
  render();
}

function saveHistory(){
  const date=new Date().toLocaleString();
  let result=`${date}<br>`;
  players.forEach(p=>{
    result+=`${p.name}: ${p.da+p.bida} điểm | `;
  });
  history.unshift(result);
  reset();
}

function renderHistory(){
  const el=document.getElementById("history");
  el.innerHTML="";
  history.forEach(h=>{
    el.innerHTML+=`<div class="history-item">${h}</div>`;
  });
}

render();
</script>

</body>
</html>
